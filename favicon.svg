<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">leasepool icon</title>
  <desc id="desc">Three overlapping executor-pool tiles in cyan and violet on a dark background.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#111a34"/>
      <stop offset="0.58" stop-color="#090e1e"/>
      <stop offset="1" stop-color="#050812"/>
    </radialGradient>
    <linearGradient id="cyanStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78efff"/>
      <stop offset="1" stop-color="#42b9e8"/>
    </linearGradient>
    <linearGradient id="violetStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b697ff"/>
      <stop offset="1" stop-color="#7d63ff"/>
    </linearGradient>
    <filter id="cyanGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="violetGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#223050" stroke-width="2"/>

  <g fill="none" stroke-linejoin="round">
    <rect x="116" y="104" width="190" height="190" rx="38"
      transform="rotate(28 211 199) skewX(-7)"
      stroke="url(#cyanStroke)" stroke-width="22" opacity="0.98" filter="url(#cyanGlow)"/>

    <rect x="214" y="126" width="190" height="190" rx="38"
      transform="rotate(28 309 221) skewX(-7)"
      stroke="url(#violetStroke)" stroke-width="22" opacity="0.96" filter="url(#violetGlow)"/>

    <rect x="154" y="226" width="190" height="190" rx="38"
      transform="rotate(28 249 321) skewX(-7)"
      stroke="#6ee7ff" stroke-width="18" opacity="0.58" filter="url(#cyanGlow)"/>
  </g>

  <circle cx="256" cy="256" r="8" fill="#dffcff" opacity="0.95"/>
</svg>
